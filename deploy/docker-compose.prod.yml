name: lila-prod

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - lila

  postgres:
    image: postgres:14-alpine
    init: true
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lila

  nakama:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address nakama:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/nakama
        --logger.level INFO
        &&
        exec /nakama/nakama
        --config /nakama/data/local.yml
        --database.address nakama:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/nakama
        --socket.server_key ${NAKAMA_SERVER_KEY:?NAKAMA_SERVER_KEY is required}
        --runtime.http_key ${NAKAMA_HTTP_KEY:?NAKAMA_HTTP_KEY is required}
        --console.username ${NAKAMA_CONSOLE_USERNAME:?NAKAMA_CONSOLE_USERNAME is required}
        --console.password ${NAKAMA_CONSOLE_PASSWORD:?NAKAMA_CONSOLE_PASSWORD is required}
        --console.signing_key ${NAKAMA_CONSOLE_SIGNING_KEY:?NAKAMA_CONSOLE_SIGNING_KEY is required}
        --session.encryption_key ${NAKAMA_SESSION_ENCRYPTION_KEY:?NAKAMA_SESSION_ENCRYPTION_KEY is required}
        --session.refresh_encryption_key ${NAKAMA_REFRESH_ENCRYPTION_KEY:?NAKAMA_REFRESH_ENCRYPTION_KEY is required}
        --logger.level INFO
    volumes:
      - type: bind
        source: ../nakama/config/local.yml
        target: /nakama/data/local.yml
        read_only: true
      - type: bind
        source: ../nakama/data/modules/build
        target: /nakama/data/modules/build
        read_only: true
    ports:
      - "${NAKAMA_PORT:-7350}:7350"
      - "${NAKAMA_CONSOLE_PORT:-7351}:7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - lila

  frontend:
    init: true
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_NAKAMA_HOST: ${SERVER_HOST:?SERVER_HOST is required}
        VITE_NAKAMA_PORT: ${NAKAMA_PORT:-7350}
        VITE_NAKAMA_SSL: ${VITE_NAKAMA_SSL:-false}
        VITE_NAKAMA_KEY: ${NAKAMA_SERVER_KEY:?NAKAMA_SERVER_KEY is required}
    depends_on:
      nakama:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    stop_grace_period: 15s
    networks:
      - lila

volumes:
  postgres_data:
  redis_data:

networks:
  lila:
    driver: bridge
