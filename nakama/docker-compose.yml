name: lila-local

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 15s
    networks:
      - lila

  postgres:
    image: postgres:14-alpine
    init: true
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nakama}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - lila

  nakama:
    image: heroiclabs/nakama:3.22.0-arm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address nakama:${POSTGRES_PASSWORD:-nakama}@postgres:5432/nakama
        --logger.level INFO
        &&
        exec /nakama/nakama
        --config /nakama/data/local.yml
        --database.address nakama:${POSTGRES_PASSWORD:-nakama}@postgres:5432/nakama
        --socket.server_key ${NAKAMA_SERVER_KEY:-lila-tictactoe-server-key}
        --runtime.http_key ${NAKAMA_HTTP_KEY:-lila-tictactoe-http-key}
        --console.username ${NAKAMA_CONSOLE_USERNAME:-admin}
        --console.password ${NAKAMA_CONSOLE_PASSWORD:-local-admin-password}
        --console.signing_key ${NAKAMA_CONSOLE_SIGNING_KEY:-lila-local-console-signing-key}
        --session.encryption_key ${NAKAMA_SESSION_ENCRYPTION_KEY:-lila-local-session-encryption-key}
        --session.refresh_encryption_key ${NAKAMA_REFRESH_ENCRYPTION_KEY:-lila-local-refresh-encryption-key}
        --logger.level INFO
    volumes:
      - type: bind
        source: ./config/local.yml
        target: /nakama/data/local.yml
        read_only: true
      - type: bind
        source: ./data/modules/build
        target: /nakama/data/modules/build
        read_only: true
    ports:
      - "${NAKAMA_PORT:-7350}:7350"
      - "${NAKAMA_CONSOLE_PORT:-7351}:7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - lila

volumes:
  postgres_data:
  redis_data:

networks:
  lila:
    driver: bridge
